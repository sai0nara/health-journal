description = 'Create a new UI component and test file'

prompt = '''
before doing anything, run a shell command to see if there's any uncommitted, 
unstaged, or unttracked changes on the current branch. If there are uncommitted, 
unstaged, or unttracked changes, abort this process and tell the user, do not go any further. 
You will be making a new view component for the Nux app as described here: {{args}}. 
Your job is to 
1) derive a safe branch name based on that component description. The format of the branch should be 
component/slug where slug should be lowercase letters kebab case and relatively short but descriptive.
2) switch the user to the branch. 
3) run a shell command to switch to the new branch. If there's uncommitted changes, tell the user 
about the process and do not continue. 
4) create a new test file for the component in the test nooks directory and write a small suite 
of meaningful tests based on the expected behavior of the new component. Do not run the test yet. 
5) make the new component in the components directory. The name of the component can be derived 
from the component description and should be camelcase. Keep file names consistent with existing 
conventions. 
6) when the component is created, run the test for the component to make sure they 
all pass. If some fail, fix the component and rerun the test until they all pass. 
7) Once everything passes, render examples of the new component in the preview page. 
8) briefly summarize what you have done to the user.

'''